# DAST scanner stack — deployed via Coolify Docker Compose build pack from git.
#
# Stack:
#   - reports : nginx with basic auth + autoindex serving the dast-reports volume
#   - scanner : docker:cli-alpine, runs Nikto / Nuclei / ZAP-baseline against each
#               target in TARGETS, writes outputs to the volume, then idles.
#
# Operate:
#   - Trigger ad-hoc scan: redeploy the service in Coolify (or push to main).
#   - View reports:        open the Coolify-managed FQDN for the `reports` service.
#
# Configuration (set in Coolify env tab, overrides defaults below):
#   TARGETS         comma-separated URLs to scan
#   SEVERITY        Nuclei severity filter   (default: medium,high,critical)
#   ZAP_MODE        baseline | full          (full = active scan; only on owned sites)
#   BASIC_AUTH_USER reports site username    (default: admin)
#   BASIC_AUTH_PASS reports site password    (REQUIRED — set in Coolify)

services:

  reports:
    image: nginx:alpine
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_REPORTS_80
      # base64-encoded htpasswd line, e.g. base64 of "admin:$apr1$xxxx$yyyy"
      # Generate with: printf 'user:%s\n' "$(openssl passwd -apr1 'yourpass')" | base64
      - HTPASSWD_B64=${HTPASSWD_B64}
    volumes:
      - dast-reports:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - "traefik.http.routers.dast-reports-https.rule=Host(`bhhccqvsghsmy5kxpak518fi.verstandai.site`)"
      - traefik.http.routers.dast-reports-https.entryPoints=https
      - traefik.http.routers.dast-reports-https.tls=true
      - traefik.http.routers.dast-reports-https.tls.certresolver=letsencrypt
      - "traefik.http.routers.dast-reports-http.rule=Host(`bhhccqvsghsmy5kxpak518fi.verstandai.site`)"
      - traefik.http.routers.dast-reports-http.entryPoints=http
      - traefik.http.routers.dast-reports-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.services.dast-reports.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        cat > /etc/nginx/conf.d/default.conf <<'NGINX'
        server {
          listen 80 default_server;
          server_name _;
          root /usr/share/nginx/html;
          charset utf-8;
          index index.html;
          autoindex on;
          autoindex_exact_size off;
          autoindex_localtime on;

          location = /healthz {
            auth_basic off;
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
          }

          location / {
            auth_basic "DAST Reports";
            auth_basic_user_file /etc/nginx/.htpasswd;
          }
        }
        NGINX
        echo "$$HTPASSWD_B64" | base64 -d > /etc/nginx/.htpasswd
        chmod 0644 /etc/nginx/.htpasswd
        echo "[init] nginx ready (htpasswd=$$(wc -c < /etc/nginx/.htpasswd) bytes)"
        exec nginx -g 'daemon off;'

  scanner:
    image: docker:cli
    restart: unless-stopped
    environment:
      - TARGETS=${TARGETS:-https://expediotechnologies.com,https://admin.expediotechnologies.com,https://dashboard.expediotechnologies.com}
      - SEVERITY=${SEVERITY:-medium,high,critical}
      - ZAP_MODE=${ZAP_MODE:-baseline}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dast-reports:/reports
    entrypoint:
      - /bin/sh
      - -c
      - |
        set +e
        mkdir -p /reports && chmod 0777 /reports

        echo "[boot $$(date -u)] scanner up; targets=$$TARGETS severity=$$SEVERITY zap_mode=$$ZAP_MODE" \
          >> /reports/scan.log

        if ! docker ps >/dev/null 2>&1; then
          echo "[boot] FATAL: no docker socket access" >> /reports/scan.log
          while true; do sleep 3600; done
        fi

        for IMG in sullo/nikto projectdiscovery/nuclei:latest zaproxy/zap-stable; do
          if docker pull "$$IMG" >/dev/null 2>&1; then
            echo "[boot] pulled $$IMG" >> /reports/scan.log
          else
            echo "[boot] WARN pull failed $$IMG" >> /reports/scan.log
          fi
        done

        RUN=$$(date -u +%Y-%m-%d_%H%M%S)
        mkdir -p "/reports/$$RUN"
        chmod 0777 "/reports/$$RUN"
        printf 'run=%s\nstarted=%s\ntargets=%s\nseverity=%s\nzap_mode=%s\n' \
          "$$RUN" "$$(date -u)" "$$TARGETS" "$$SEVERITY" "$$ZAP_MODE" \
          > "/reports/$$RUN/_meta.txt"
        echo "==== DAST run $$RUN ====" >> /reports/scan.log

        OLD_IFS=$$IFS
        IFS=','
        for T in $$TARGETS; do
          T=$$(echo "$$T" | sed 's/^ *//;s/ *$$//')
          [ -z "$$T" ] && continue
          SAFE=$$(echo "$$T" | sed -E 's#^https?://##; s#[^a-zA-Z0-9.-]+#_#g')
          mkdir -p "/reports/$$RUN/$$SAFE"
          chmod 0777 "/reports/$$RUN/$$SAFE"
          echo ">> $$T" >> /reports/scan.log

          echo "  [1/3 nikto]" >> /reports/scan.log
          docker run --rm -v dast-reports:/output sullo/nikto \
            -h "$$T" -Tuning x6 -maxtime 180s -ask no \
            -o "/output/$$RUN/$$SAFE/nikto.html" -Format html \
            >> /reports/scan.log 2>&1

          echo "  [2/3 nuclei]" >> /reports/scan.log
          docker run --rm -v dast-reports:/output projectdiscovery/nuclei:latest \
            -u "$$T" -severity "$$SEVERITY" \
            -o "/output/$$RUN/$$SAFE/nuclei.txt" -stats -nc -silent \
            >> /reports/scan.log 2>&1

          if [ "$$ZAP_MODE" = "full" ]; then
            echo "  [3/3 zap-FULL]" >> /reports/scan.log
            docker run --rm -v dast-reports:/zap/wrk/:rw zaproxy/zap-stable \
              zap-full-scan.py -t "$$T" \
              -r "$$RUN/$$SAFE/zap-full.html" \
              -J "$$RUN/$$SAFE/zap-full.json" \
              >> /reports/scan.log 2>&1
          else
            echo "  [3/3 zap-baseline]" >> /reports/scan.log
            docker run --rm -v dast-reports:/zap/wrk/:rw zaproxy/zap-stable \
              zap-baseline.py -t "$$T" \
              -r "$$RUN/$$SAFE/zap-baseline.html" \
              -J "$$RUN/$$SAFE/zap-baseline.json" \
              >> /reports/scan.log 2>&1
          fi
        done
        IFS=$$OLD_IFS

        printf 'finished=%s\n' "$$(date -u)" >> "/reports/$$RUN/_meta.txt"
        echo "==== complete $$RUN ====" >> /reports/scan.log

        while true; do sleep 3600; done

volumes:
  dast-reports:
    name: dast-reports
